# Netlify Configuration for AFKmate Website

[build]
  publish = "."

# Custom headers for security and caching
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Redirects
[[redirects]]
  from = "/install"
  to = "https://marketplace.visualstudio.com/items?itemName=afkmate.afkmate"
  status = 302

[[redirects]]
  from = "/github"
  to = "https://github.com/afkmate/afkmate-vscode"
  status = 302

[[redirects]]
  from = "/premium"
  to = "/premium.html"
  status = 200

# Handle 404
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
